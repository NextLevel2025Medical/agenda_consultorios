{% extends "base.html" %}

{% block page_title %}CONCEPT SYS — LOGIN{% endblock %}

{% block header_title %}{% endblock %}

{% block content %}
<style>
  :root{
    --gold-strong:  #efc363;
    --gold-main:    #dcaf4e;
    --gold-soft:    #cc9f3e;
    --gold-deep:    #ba8d29;

    --ink:    #0B1220;
    --text-main:  rgba(255,255,255,0.92);
    --muted:      rgba(239,195,99,0.75);
  }

  body {
    background: #05070d;
  }

  .login-brand{
    font-family: "Cormorant Garamond", serif;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-weight: 700;
  }
</style>

<div class="min-h-[65vh] flex items-center justify-center">
  <div class="w-full max-w-md">

    <!-- LOGO / BRAND -->
    <div class="flex flex-col items-center text-center mb-6">
      <img
        src="/static/logo1.png"
        alt="Concept"
        class="h-36 w-36 rounded-full"
        style="filter: drop-shadow(0 14px 30px rgba(0,0,0,.45));"
      />

      <div class="mt-4 text-3xl login-brand text-[color:var(--gold-main)]">
        CONCEPT SYS
      </div>

      <div class="mt-1 text-sm text-white/60">
        Sistema interno de gestão clínica
      </div>
    </div>

    <!-- CARD -->
    <div class="rounded-2xl p-7"
         style="
           background: #0b0f19;
           border: 1px solid rgba(220,175,78,0.25);
           box-shadow: 0 20px 60px rgba(0,0,0,.6);
         ">

      {% if error %}
        <div class="mb-4 rounded-xl border border-red-500/30 bg-red-500/10 px-4 py-3 text-sm">
          {{ error }}
        </div>
      {% endif %}

      <form class="space-y-4" method="post" action="/login">

        <!-- USUÁRIO -->
        <div>
          <label class="text-sm text-white/70">Usuário</label>
          <input
            name="username"
            required
            class="mt-2 w-full rounded-xl bg-white text-slate-900 border border-gray-200 px-4 py-3 outline-none focus:border-[color:var(--gold-main)]"
            autocomplete="username"
          />
        </div>

        <!-- SENHA -->
        <div>
          <label class="text-sm text-white/70">Senha</label>
          <input
            type="password"
            name="password"
            required
            class="mt-2 w-full rounded-xl bg-white text-slate-900 border border-gray-200 px-4 py-3 outline-none focus:border-[color:var(--gold-main)]"
            autocomplete="current-password"
          />
        </div>

        <!-- BOTÃO -->
        <button
          type="submit"
          class="w-full rounded-xl px-4 py-3 font-semibold transition"
          style="
            background: #0b0f19;
            border: 1px solid var(--gold-soft);
            color: var(--gold-main);
            letter-spacing: 0.08em;
            text-transform: uppercase;
          "
          onmouseover="this.style.filter='brightness(1.08)'"
          onmouseout="this.style.filter='none'"
        >
          Entrar
        </button>

        <div class="pt-2 text-xs text-white/45 text-center">
          Acesso restrito • Concept Clinic
        </div>

      </form>
    </div>

  </div>
</div>
{% endblock %}
