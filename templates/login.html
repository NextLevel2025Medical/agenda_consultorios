{% extends "base.html" %}

{% block page_title %}CONCEPT SYS — LOGIN{% endblock %}

{% block header_title %}{% endblock %}

{% block content %}
<style>
  :root{
    --gold-strong: #efc363;
    --gold-main:   #dcaf4e;
    --gold-soft:   #cc9f3e;
    --gold-deep:   #ba8d29;

    --bg-dark:     #05070d;
    --card-bg:     #0b0f19;
    --text-main:   rgba(255,255,255,0.92);
    --text-soft:   rgba(255,255,255,0.72);
    --text-muted:  rgba(255,255,255,0.48);
  }

  .login-screen{
    min-height: 78vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 56px 24px;
    background:
      radial-gradient(circle at center, rgba(220,175,78,0.08) 0%, rgba(220,175,78,0.03) 22%, rgba(5,7,13,0) 52%),
      linear-gradient(180deg, #070913 0%, #05070d 100%);
    position: relative;
    overflow: hidden;
  }

  /* textura vertical sutil igual à referência */
  .login-screen::before{
    content: "";
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(
        90deg,
        rgba(255,255,255,0.00) 0px,
        rgba(255,255,255,0.00) 22px,
        rgba(220,175,78,0.018) 38px,
        rgba(255,255,255,0.00) 72px
      );
    opacity: .35;
    pointer-events: none;
  }

  .login-shell{
    width: 100%;
    max-width: 540px;
    position: relative;
    z-index: 1;
  }

  .login-brand{
    font-family: "Cormorant Garamond", serif;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-weight: 700;
    color: var(--gold-main);
    line-height: 1;
  }

  .login-card{
    background: linear-gradient(180deg, rgba(12,16,27,0.98) 0%, rgba(10,14,24,0.98) 100%);
    border: 1px solid rgba(220,175,78,0.36);
    border-radius: 24px;
    padding: 34px 34px 26px;
    box-shadow:
      0 26px 80px rgba(0,0,0,.62),
      inset 0 0 0 1px rgba(255,255,255,.015);
  }

  .login-label{
    display: block;
    font-size: 14px;
    font-weight: 600;
    color: var(--gold-main);
    margin-bottom: 10px;
  }

  .login-input{
    width: 100%;
    height: 50px;
    border-radius: 10px;
    background: #f3eee7;
    border: 1px solid rgba(255,255,255,0.22);
    color: #2a241d;
    padding: 0 18px;
    outline: none;
    transition: border-color .18s ease, box-shadow .18s ease, transform .18s ease;
  }

  .login-input:focus{
    border-color: rgba(220,175,78,0.85);
    box-shadow: 0 0 0 3px rgba(220,175,78,0.10);
  }

  .login-button{
    width: 100%;
    height: 54px;
    border-radius: 12px;
    background: linear-gradient(180deg, #090c14 0%, #070910 100%);
    border: 1px solid rgba(220,175,78,0.38);
    color: var(--gold-main);
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: transform .18s ease, filter .18s ease, border-color .18s ease;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
  }

  .login-button:hover{
    filter: brightness(1.06);
    border-color: rgba(239,195,99,0.55);
  }

  .login-button:active{
    transform: translateY(1px);
  }

  .login-help{
    color: var(--text-muted);
    font-size: 13px;
    text-align: center;
    margin-top: 16px;
  }

  .login-error{
    margin-bottom: 18px;
    border-radius: 14px;
    border: 1px solid rgba(239, 68, 68, 0.28);
    background: rgba(239, 68, 68, 0.10);
    padding: 12px 14px;
    font-size: 14px;
    color: rgba(255,255,255,.92);
  }

  @media (max-width: 640px){
    .login-screen{
      min-height: 72vh;
      padding: 36px 18px;
    }

    .login-shell{
      max-width: 100%;
    }

    .login-card{
      padding: 26px 22px 22px;
      border-radius: 20px;
    }
  }
</style>

<div class="login-screen">
  <div class="login-shell">

    <!-- LOGO / BRAND -->
    <div class="flex flex-col items-center text-center mb-8">
      <img
        src="/static/logo1.png"
        alt="Concept"
        class="h-36 w-36 rounded-full object-cover"
        style="filter: drop-shadow(0 14px 30px rgba(0,0,0,.45));"
      />

      <div class="mt-5 text-[52px] sm:text-[58px] login-brand">
        CONCEPT SYS
      </div>

      <div class="mt-2 text-[15px] text-white/65">
        Sistema interno de gestão clínica
      </div>
    </div>

    <!-- CARD -->
    <div class="login-card">
      {% if error %}
        <div class="login-error">
          {{ error }}
        </div>
      {% endif %}

      <form class="space-y-5" method="post" action="/login">
        <!-- USUÁRIO -->
        <div>
          <label class="login-label">Usuário</label>
          <input
            name="username"
            required
            class="login-input"
            autocomplete="username"
          />
        </div>

        <!-- SENHA -->
        <div>
          <label class="login-label">Senha</label>
          <input
            type="password"
            name="password"
            required
            class="login-input"
            autocomplete="current-password"
          />
        </div>

        <!-- BOTÃO -->
        <div class="pt-1">
          <button type="submit" class="login-button">
            Entrar
          </button>
        </div>

        <div class="login-help">
          Acesso restrito • Concept Clinic
        </div>
      </form>
    </div>

  </div>
</div>
{% endblock %}
